---
# https://taskfile.dev
version: '3'

tasks:
  # ============================================================================
  # Standard Interface (AGENTS.md compliance)
  # ============================================================================

  init:
    desc: Perform one-time environment setup
    cmds:
      - pre-commit install
      - terraform init

  deps:
    desc: Check for required dependencies and validate environment
    silent: true
    cmds:
      - command -v terraform >/dev/null 2>&1 || { echo "terraform not found"; exit 1; }
      - command -v packer >/dev/null 2>&1 || { echo "packer not found"; exit 1; }
      - command -v gcloud >/dev/null 2>&1 || { echo "gcloud not found"; exit 1; }
      - command -v nomad >/dev/null 2>&1 || { echo "nomad not found"; exit 1; }
      - command -v consul >/dev/null 2>&1 || { echo "consul not found"; exit 1; }
      - echo "✓ All required dependencies are available"

  lint:
    desc: Run all code quality, formatting, and security checks
    cmds:
      - 'yamllint -d "{extends: default, rules: {line-length: disable}}" .'
      - pre-commit run --all-files

  test:
    desc: Execute local unit and integration test suite
    dir: jobs/monte-carlo
    cmds:
      - python -m pytest tests/ -v

  test:all:
    desc: Run complete test suite across all modules
    cmds:
      - task: test
      - task: tf:validate

  test:ci:
    desc: Execute full verification pipeline as defined in CI
    cmds:
      - task: lint
      - task: test:all

  build:
    desc: Build all artifacts (Packer images)
    cmds:
      - task: packer:build

  clean:
    desc: Remove build artifacts, temporary files, and cache
    cmds:
      - |
        echo "Cleaning GCP images..."
        echo GCP Project ID: {{ .GCP_PROJECT }}
        for image in $(gcloud compute images list --project {{ .GCP_PROJECT }} --no-standard-images --format="value(NAME)"); do
          gcloud compute images delete --project {{ .GCP_PROJECT }} -q $image
        done
      - echo "Cleaning temporary files..."
      - rm -rf .tmp/ || true
      - rm -rf .pytest_cache/ || true
      - rm -rf jobs/monte-carlo/.pytest_cache/ || true
      - rm -rf jobs/monte-carlo/__pycache__/ || true
    ignore_error: true
    vars:
      GCP_PROJECT:
        sh: gcloud config get-value project

  # ============================================================================
  # Terraform Namespace
  # ============================================================================

  tf:init:
    aliases: ["tf-init"]
    desc: Initialize Terraform
    cmds:
      - terraform init

  tf:validate:
    aliases: ["validate", "tf-validate"]
    desc: Validate Terraform configuration
    cmds:
      - terraform validate

  tf:fmt:
    aliases: ["fmt", "tf-fmt"]
    desc: Format Terraform files
    cmds:
      - terraform fmt -recursive

  tf:plan:
    aliases: ["plan", "tf-plan"]
    desc: Run Terraform plan
    cmds:
      - terraform plan

  tf:apply:
    aliases: ["apply"]
    desc: Apply Terraform changes
    cmds:
      - terraform apply

  tf:destroy:
    aliases: ["destroy", "tf-destroy"]
    desc: Destroy Terraform infrastructure
    cmds:
      - terraform destroy --auto-approve

  tf:output:dc1:
    aliases: ["tfo1", "tf-output-dc1"]
    desc: Get dc1 environment variables and outputs
    silent: true
    cmds:
      - rm terraform.tfstate || true
      - rm backend.tf || true
      - ln -s dc1-backend.config backend.tf
      - terraform init
      - terraform output
      - terraform output -raw eval_vars

  tf:output:dc2:
    aliases: ["tfo2", "tf-output-dc2"]
    desc: Get dc2 environment variables and outputs
    cmds:
      - rm terraform.tfstate || true
      - rm backend.tf || true
      - ln -s dc2-backend.config backend.tf
      - terraform init
      - terraform output
      - terraform output -raw eval_vars

  # ============================================================================
  # Packer Namespace
  # ============================================================================

  packer:build:
    aliases: ["packer"]
    desc: Build all Packer images
    cmds:
      - task: packer:base
      - task: packer:client

  packer:base:
    aliases: ["packer-base"]
    desc: Build base server image
    dir: packer/gcp
    cmds:
      - packer init .
      - time packer build {{.CLI_ARGS}} -only=googlecompute.consul_nomad .
      - echo "Base image build complete."

  packer:client:
    aliases: ["packer-client"]
    desc: Build GPU-enabled client image
    dir: packer/gcp
    cmds:
      - packer init .
      - time packer build -force -only=googlecompute.consul_nomad_client_gpu .
      - echo "Client image build complete."

  # ============================================================================
  # Consul Namespace
  # ============================================================================

  consul:status:
    aliases: ["consul-status", "status:consul"]
    desc: Check Consul cluster status
    silent: true
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        echo "=== Consul Members ==="
        consul members
        echo ""
        echo "=== Consul Operator Raft List-Peers ==="
        consul operator raft list-peers
        echo ""
        echo "=== Consul Catalog Services ==="
        consul catalog services

  consul:ui:
    desc: Open Consul UI in browser
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        open $CONSUL_HTTP_ADDR

  # ============================================================================
  # Nomad Namespace
  # ============================================================================

  nomad:setup:
    aliases: ["setup"]
    desc: Setup Nomad environment for workload identity and CSI plugins
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        nomad setup consul -y
      - task: nomad:setup:csi

  nomad:setup:csi:
    aliases: ["setup-csi"]
    desc: Deploy GCE Persistent Disk CSI plugins
    silent: true
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        export GCP_PROJECT=$(terraform output -raw gcp_project)
        export GCP_WI_PROVIDER=$(terraform output -raw gcp_wi_provider)
        export GCP_SERVICE_ACCOUNT=$(terraform output -raw gcp_wi_csi_google_pd_service_account)

        echo "Deploying GCE PD CSI controller plugin..."
        nomad job run \
          -var gcp_project=$GCP_PROJECT \
          -var gcp_wi_provider=$GCP_WI_PROVIDER \
          -var gcp_service_account=$GCP_SERVICE_ACCOUNT \
          jobs/gce-pd-csi-controller.nomad

        echo "Deploying GCE PD CSI node plugin..."
        nomad job run jobs/gce-pd-csi-node.nomad

        echo "Waiting for CSI plugins to be ready..."
        sleep 15

        echo "CSI Plugin Status:"
        nomad plugin status gce-pd || echo "Warning: Plugin not yet fully registered"

  nomad:status:
    aliases: ["nomad-status", "status:nomad"]
    desc: Check Nomad cluster status
    silent: true
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        echo "=== Nomad Server Members ==="
        nomad server members
        echo ""
        echo "=== Nomad Node Status ==="
        nomad node status
        echo ""
        echo "=== Nomad Job Status ==="
        nomad job status

  nomad:ui:
    aliases: ["ui"]
    desc: Open Consul and Nomad UIs in browser
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        open $CONSUL_HTTP_ADDR
        nomad ui -authenticate -tls-skip-verify
        echo $NOMAD_TOKEN | pbcopy
        echo "Nomad token copied to clipboard."
        echo "Consul token: $CONSUL_HTTP_TOKEN"

  # ============================================================================
  # Job Namespace
  # ============================================================================

  job:traefik:
    desc: Deploy Traefik ingress controller with Consul Connect
    silent: true
    vars:
      CONSUL_FQDN:
        sh: terraform output -raw consul_fqdn
      CONSUL_TOKEN:
        sh: terraform output -raw CONSUL_TOKEN
      DOMAIN:
        sh: terraform output -raw ingress_fqdn
      EMAIL:
        sh: terraform output -raw letsencrypt_email
    cmds:
      - |
        eval $(terraform output -raw eval_vars)

        # Verify CSI plugin is available
        if ! nomad plugin status gce-pd &>/dev/null; then
          echo "ERROR: CSI plugin 'gce-pd' not found."
          echo "Please run 'task nomad:setup' or 'task nomad:setup:csi' first."
          exit 1
        fi

        echo "Deploying Traefik with domain: {{ .DOMAIN }}"
        nomad volume create jobs/traefik-csi-volume.hcl || echo "Volume already exists"
        nomad job run \
          -var consul_fqdn={{ .CONSUL_FQDN }} \
          -var domain={{ .DOMAIN }} \
          -var email={{ .EMAIL }} \
          -var consul_token={{ .CONSUL_TOKEN }} \
          jobs/traefik-connect.nomad

  job:demo:
    desc: Deploy all example Nomad workloads (requires CSI plugins)
    silent: true
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        echo "Deploying example applications..."
        nomad job run jobs/echoserver.nomad
        nomad job run jobs/helloworld.nomad
      - task: job:ui

  job:purge:
    desc: Stop and purge all running Nomad jobs
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        nomad job status -json -short | jq -r '.[].ID' | xargs -n1 nomad job stop -purge

  job:ui:
    desc: Display URLs for deployed job UIs
    silent: true
    cmds:
      - echo https://{{ .FQDN }}:8443/dashboard/
      - echo https://echoserver.{{ .FQDN }}
      - echo https://helloworld.{{ .FQDN }}
    vars:
      FQDN:
        sh: terraform output ingress_fqdn

  job:wi:
    desc: Run the GCP workload identity demo job
    vars:
      GCP_PROJECT:
        sh: terraform output -raw gcp_project
      GCP_WI_PROVIDER:
        sh: terraform output -raw gcp_wi_provider
      GCP_SERVICE_ACCOUNT:
        sh: terraform output -raw gcp_wi_demo_service_account
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        nomad job stop -purge gcp-wi-demo || true
        nomad job run \
          -var gcp_project={{ .GCP_PROJECT }} \
          -var gcp_wi_provider={{ .GCP_WI_PROVIDER }} \
          -var gcp_service_account={{ .GCP_SERVICE_ACCOUNT }} \
          jobs/gcp-wi-demo.nomad

  job:wi:status:
    desc: Check status of the workload identity demo job
    cmds:
      - |
        eval $(terraform output -raw eval_vars)
        nomad job status gcp-wi-demo
        nomad alloc status -json -short | jq -r '.[] | select(.JobID == "gcp-wi-demo") | .ID' | xargs -n1 nomad alloc status

  job:wi:exec:
    desc: Execute shell in workload identity demo job allocation
    vars:
      ID:
        sh: eval $(terraform output -raw eval_vars) && nomad job allocs -json gcp-wi-demo | jq -r '.[-1].ID'
    cmds:
      - eval $(terraform output -raw eval_vars) && nomad alloc exec -i -t {{ .ID }} bash

  job:echoserver:
    desc: Open echoserver in browser
    cmds:
      - open https://echoserver.{{ .ingress_fqdn }}
    vars:
      ingress_fqdn:
        sh: terraform output ingress_fqdn

  # ============================================================================
  # GCP Namespace
  # ============================================================================

  gcp:rolling-update:servers:
    desc: Trigger a rolling replacement of all server MIG instances
    silent: true
    prompt: This will replace all server instances with the current instance template. Continue?
    vars:
      GCP_PROJECT:
        sh: terraform output -raw gcp_project
      GCP_REGION:
        sh: terraform output -raw gcp_region
      CLUSTER_NAME:
        sh: terraform output -raw cluster_name
    cmds:
      - |
        MIG="{{.CLUSTER_NAME}}-server-mig"
        echo "Rolling update: ${MIG}"
        NUM_ZONES=$(gcloud compute instance-groups managed describe "${MIG}" \
          --project={{.GCP_PROJECT}} \
          --region={{.GCP_REGION}} \
          --format="value(distributionPolicy.zones)" | tr ';' '\n' | wc -l | tr -d ' ')
        gcloud compute instance-groups managed rolling-action replace "${MIG}" \
          --project={{.GCP_PROJECT}} \
          --region={{.GCP_REGION}} \
          --max-surge=0 \
          --max-unavailable="${NUM_ZONES}"

  gcp:rolling-update:clients:
    aliases: ["rolling-update"]
    desc: Trigger a rolling replacement of all client MIG instances
    silent: true
    prompt: This will replace all client instances with the current instance template. Continue?
    vars:
      GCP_PROJECT:
        sh: terraform output -raw gcp_project
      GCP_REGION:
        sh: terraform output -raw gcp_region
      CLUSTER_NAME:
        sh: terraform output -raw cluster_name
    cmds:
      - |
        for mig in $(gcloud compute instance-groups managed list \
          --project={{.GCP_PROJECT}} \
          --filter="name~{{.CLUSTER_NAME}}-clients-mig" \
          --format="value(name)"); do
          echo "Rolling update: ${mig}"
          NUM_ZONES=$(gcloud compute instance-groups managed describe "${mig}" \
            --project={{.GCP_PROJECT}} \
            --region={{.GCP_REGION}} \
            --format="value(distributionPolicy.zones)" | tr ';' '\n' | wc -l | tr -d ' ')
          gcloud compute instance-groups managed rolling-action replace "${mig}" \
            --project={{.GCP_PROJECT}} \
            --region={{.GCP_REGION}} \
            --max-surge=0 \
            --max-unavailable="${NUM_ZONES}"
        done

  gcp:destroy:mig:
    aliases: ["gcloud-destroy-mig"]
    desc: Destroy managed instance groups via gcloud
    prompt: This will destroy all managed instance groups. Continue?
    cmds:
      - bash scripts/gcloud-destroy-mig.sh

  gcp:destroy:lb:
    aliases: ["gcloud-destroy-lb"]
    desc: Destroy load balancers and related resources via gcloud
    prompt: This will destroy all load balancers and forwarding rules. Continue?
    cmds:
      - bash scripts/gcloud-destroy-lb.sh

  gcp:destroy:all:
    aliases: ["gcloud-destroy-all"]
    desc: Destroy all GCP resources (MIGs and LBs) via gcloud
    prompt: This will destroy ALL managed instance groups and load balancers. Continue?
    cmds:
      - task: gcp:destroy:lb
      - task: gcp:destroy:mig

  gcp:cert:status:
    aliases: ["google-cert"]
    desc: Check Google-managed SSL certificate status
    cmds:
      - gcloud compute ssl-certificates describe dc1-hcp-global-cert

  gcp:logs:
    aliases: ["check-server-logs"]
    desc: Check server logs via gcloud SSH and IAP
    cmds:
      - bash scripts/check-server-logs.sh {{.CLI_ARGS}}

  gcp:instances:
    aliases: ["instances"]
    desc: List all GCP compute instance names in the project
    silent: true
    vars:
      GCP_PROJECT:
        sh: terraform output -raw gcp_project
    cmds:
      - gcloud compute instances list --project={{.GCP_PROJECT}} --format="table(name,zone,status,machineType.scope())"

  gcp:connect:
    aliases: ["connect"]
    desc: SSH onto a GCP instance via IAP (e.g. task connect -- <instance-name>)
    silent: true
    vars:
      GCP_PROJECT:
        sh: terraform output -raw gcp_project
    cmds:
      - |
        INSTANCE="{{.CLI_ARGS}}"
        ZONE=$(gcloud compute instances list \
          --project={{.GCP_PROJECT}} \
          --filter="name=${INSTANCE}" \
          --format="value(zone)" \
          --limit=1)
        if [ -z "$ZONE" ]; then
          echo "ERROR: instance '${INSTANCE}' not found in project {{.GCP_PROJECT}}"
          exit 1
        fi
        gcloud compute ssh "${INSTANCE}" \
          --project={{.GCP_PROJECT}} \
          --zone="${ZONE}" \
          --tunnel-through-iap

  # ============================================================================
  # Docker Namespace
  # ============================================================================

  docker:build:
    aliases: ["docker-build"]
    desc: Build and push multi-arch Docker image for Monte Carlo job
    dir: jobs/monte-carlo
    cmds:
      - |
        docker buildx build --platform linux/amd64,linux/arm64 \
        -t ghcr.io/nhsy-hcp/consul-nomad-gcp/monte-carlo:latest \
        --push .

  # ============================================================================
  # Bootstrap Namespace
  # ============================================================================

  bootstrap:dc1:
    aliases: ["bootstrap-dc1"]
    desc: Bootstrap the dc1 HCP Terraform workspace
    dir: bootstrap/dc1
    cmds:
      - terraform init
      - terraform validate
      - terraform apply

  # ============================================================================
  # Status Namespace
  # ============================================================================

  status:
    desc: Check both Consul and Nomad cluster status
    cmds:
      - task: consul:status
      - task: nomad:status
